server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 30M;

    # Reverse-proxy the API to the backend over the internal Docker network.
    # Using Docker's embedded DNS resolver + a variable upstream means nginx
    # starts even if the backend isn't ready yet (no "host not found" crash);
    # it resolves "backend" at request time instead of at config load.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $zeylo_backend "backend:3000";
        # No URI part here, so the original request URI (/api/...) is forwarded
        # unchanged — which matches the NestJS global prefix "/api".
        proxy_pass http://$zeylo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback — all client-side routes (/admin, /app, …) resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
